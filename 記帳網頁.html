<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳本 · 個人收支管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-ui: "Noto Sans TC", system-ui, sans-serif;
  --font-num: "IBM Plex Mono", ui-monospace, monospace;
  --font-display: "Space Grotesk", "Noto Sans TC", sans-serif;

  /* fixed category palette — consistent across themes */
  --cat-food:    #fb923c;
  --cat-transit: #38bdf8;
  --cat-shop:    #c084fc;
  --cat-home:    #2dd4bf;
  --cat-fun:     #f472b6;
  --cat-health:  #f87171;
  --cat-edu:     #a3e635;
  --cat-travel:  #facc15;
  --cat-comm:    #818cf8;
  --cat-other:   #94a3b8;
}

/* ============ THEMES ============ */
[data-theme="midnight"] {
  --bg: #0a1020;
  --bg-grad: radial-gradient(1200px 700px at 80% -10%, #14203a 0%, #0a1020 55%);
  --surface: #111c33;
  --surface-2: #18254180;
  --surface-solid: #182541;
  --border: rgba(148,168,210,0.12);
  --border-strong: rgba(148,168,210,0.22);
  --text: #e8eefb;
  --text-dim: #93a4c4;
  --text-faint: #5e6e8f;
  --accent: #38bdf8;
  --accent-soft: rgba(56,189,248,0.14);
  --income: #34d399;
  --expense: #fb7185;
  --ring: rgba(56,189,248,0.35);
  --shadow: 0 18px 50px -18px rgba(0,0,0,0.7);
}
[data-theme="carbon"] {
  --bg: #0c0c0e;
  --bg-grad: radial-gradient(1200px 700px at 85% -10%, #1c1c20 0%, #0c0c0e 55%);
  --surface: #161618;
  --surface-2: #1f1f2380;
  --surface-solid: #1f1f23;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.16);
  --text: #f1efe9;
  --text-dim: #a3a09a;
  --text-faint: #6b6862;
  --accent: #f0b429;
  --accent-soft: rgba(240,180,41,0.13);
  --income: #4ade80;
  --expense: #f87171;
  --ring: rgba(240,180,41,0.35);
  --shadow: 0 18px 50px -18px rgba(0,0,0,0.8);
}
[data-theme="slate"] {
  --bg: #0f141b;
  --bg-grad: radial-gradient(1200px 700px at 80% -10%, #1a2230 0%, #0f141b 55%);
  --surface: #161d27;
  --surface-2: #1d273480;
  --surface-solid: #1d2734;
  --border: rgba(160,180,210,0.11);
  --border-strong: rgba(160,180,210,0.2);
  --text: #e7ecf3;
  --text-dim: #94a3b8;
  --text-faint: #5d6b80;
  --accent: #a78bfa;
  --accent-soft: rgba(167,139,250,0.14);
  --income: #34d399;
  --expense: #fb7185;
  --ring: rgba(167,139,250,0.35);
  --shadow: 0 18px 50px -18px rgba(0,0,0,0.7);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { min-height: 100%; }
.num { font-family: var(--font-num); font-feature-settings: "tnum" 1; letter-spacing: -0.01em; }

/* scrollbars */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover { background: var(--text-faint); background-clip: padding-box; }
*::-webkit-scrollbar-track { background: transparent; }

::selection { background: var(--accent-soft); }
[style*="growW"] { transform-origin: left center; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select { font-family: inherit; }

/* transitions for theme switch */
.app-root, .app-root * { transition: background-color .35s ease, border-color .35s ease, color .25s ease; }

@keyframes fadeUp { from { transform: translateY(9px); } to { transform: none; } }
@keyframes pop { from { opacity:0; transform: scale(.96);} to { opacity:1; transform:none; } }
@keyframes sweep { from { stroke-dashoffset: var(--len);} to { stroke-dashoffset: var(--off);} }
@keyframes growW { from { transform: scaleX(0);} to { transform: scaleX(1); } }
@keyframes overlayIn { from { opacity:0;} to { opacity:1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; animation-delay: 0ms !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>

<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/config.jsx"></script>
<script type="text/babel" src="app/store.jsx"></script>
<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/calendar.jsx"></script>
<script type="text/babel" src="app/charts.jsx"></script>
<script type="text/babel" src="app/views.jsx"></script>
<script type="text/babel" src="app/views2.jsx"></script>
<script type="text/babel" src="app/features.jsx"></script>
<script type="text/babel" src="app/modals.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
